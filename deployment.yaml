apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default # 👈 칵테일클라우드 내 배포할 네임스페이스 지정
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-app
        image: 192.168.88.139/library/sample-app:6
        ports:
        - containerPort: 8080
